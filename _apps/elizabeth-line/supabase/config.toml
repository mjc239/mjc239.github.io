# Minimal Supabase CLI config — only what the tfl-proxy function needs.
# project_id is just a local name for the CLI; the remote project is chosen
# with `supabase link` or `--project-ref` on deploy.
project_id = "elizabeth-line-departures"

[functions.tfl-proxy]
# The browser calls this anonymously; access is gated by the origin
# allow-list in the function itself, not by a Supabase JWT.
verify_jwt = false
